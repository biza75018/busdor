<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bus d'Or — Classement</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Verdana&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100dvh;font-family:Verdana,Geneva,sans-serif;background:#003B7A;color:#fff;overflow-x:hidden}
:root{
  --blue:#003B7A;--blue2:#004FA3;--blue3:#0062CC;
  --green:#78BE20;--green2:#5DA015;
  --white:#FFFFFF;--muted:#8AABCC;--border:#1A5599;
  --card:#002D63;--card2:#00204A;
  --gold:#F5C842;--gold2:#D4A800;--red:#E8392A;
}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 50% -5%,#0062CC30 0%,transparent 60%),
             radial-gradient(ellipse 40% 30% at 0% 100%,#78BE2015 0%,transparent 50%)}
#app{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 16px 60px;display:flex;flex-direction:column;align-items:center;gap:14px;min-height:100dvh}

/* HEADER */
.header{width:100%;padding:20px 0 6px;display:flex;flex-direction:column;align-items:center;gap:8px}
.header-logo{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 16px;width:100%}
.logo-stripe{width:6px;height:40px;border-radius:3px;flex-shrink:0;background:linear-gradient(180deg,var(--green),var(--blue3))}
.logo-texts{flex:1}
.logo-brand{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--white);text-transform:uppercase}
.logo-sub2{font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-top:1px;text-transform:uppercase}
.logo-badge{background:var(--gold);color:#000;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.header-title{text-align:center}
.title-crown{font-size:36px;line-height:1}
.title-main{font-size:32px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,#FFE066,var(--gold),#D4A800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px #F5C84250);line-height:1}
.title-sub{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px}

/* TOP BAR */
.lb-top{width:100%;display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.lb-title{font-size:18px;font-weight:700;letter-spacing:1px}
.lb-refresh{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:10px;color:var(--muted);cursor:pointer;font-family:Verdana,sans-serif;transition:all .2s;text-transform:uppercase}
.lb-refresh:active{transform:scale(.95)}

/* LAST UPDATE */
.last-update{font-size:9px;color:var(--muted);text-align:center;letter-spacing:1px;text-transform:uppercase}

/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:6px;width:100%}
.pod{flex:1;display:flex;flex-direction:column;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 6px}
.pod.p1{border-color:var(--gold);box-shadow:0 0 24px #F5C84235}
.pod.p2{border-color:#B0B0B030}
.pod.p3{border-color:#CD7F3230}
.pod-medal{font-size:24px;margin-bottom:5px}
.pod-av{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin-bottom:6px;background:var(--card2);color:#fff}
.p1 .pod-av{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.p2 .pod-av{background:linear-gradient(135deg,#B0B0B0,#808080);color:#fff}
.p3 .pod-av{background:linear-gradient(135deg,#CD7F32,#A05A20);color:#fff}
.pod-name{font-size:11px;font-weight:700;text-align:center;word-break:break-all;color:var(--white)}
.pod-pts{font-size:14px;font-weight:700;color:var(--gold);margin-top:4px}

.hr{width:100%;height:1px;background:var(--border)}

/* LIST */
.lb-list{width:100%;display:flex;flex-direction:column;gap:7px}
.lb-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 14px}
.lb-rank{font-size:12px;color:var(--muted);width:24px;text-align:center;flex-shrink:0;font-weight:700}
.lb-av{width:38px;height:38px;border-radius:10px;background:var(--blue2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:700;color:var(--white)}
.lb-sub{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.3px;text-transform:uppercase;line-height:1.7}
.lb-pts{font-size:15px;font-weight:700;color:var(--gold);flex-shrink:0}

.empty{text-align:center;color:var(--muted);font-size:11px;padding:40px 0;line-height:2;width:100%;letter-spacing:.5px}

/* SPINNER */
.spinner{width:18px;height:18px;border:2px solid #ffffff30;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTO REFRESH badge */
.auto-badge{background:var(--green);color:#fff;font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-logo">
      <div class="logo-stripe"></div>
      <div class="logo-texts">
        <div class="logo-brand">Transdev</div>
        <div class="logo-sub2">Express Roissy</div>
      </div>
      <div class="logo-badge">🏆 Classement</div>
    </div>
    <div class="header-title">
      <div class="title-crown">🏆</div>
      <div class="title-main">Bus d'Or</div>
      <div class="title-sub">Classement en temps réel</div>
    </div>
  </div>

  <div class="lb-top">
    <div class="lb-title">Résultats <span class="auto-badge">Live</span></div>
    <button class="lb-refresh" id="btnRefresh">↻ Actualiser</button>
  </div>

  <div class="last-update" id="lastUpdate">—</div>

  <div class="podium" id="podium"></div>
  <div class="hr"></div>
  <div class="lb-list" id="lbList">
    <div class="empty"><span class="spinner"></span> Chargement…</div>
  </div>

</div>

<script>
const SB_URL = 'https://ujyyzdcowyzqieejziyb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqeXl6ZGNvd3l6cWllZWp6aXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTQyMjksImV4cCI6MjA5MTkzMDIyOX0.JRYfCjPE0m1wJuQSV0XoK_C8WOBwn7t38qyheKH0fVU';

async function fetchScores() {
  const r = await fetch(
    SB_URL + '/rest/v1/busdor?select=prenom,nom,score_depart,score_ecrit,penalite,zone_pts,temps_pts,score_final,date_eval&order=score_final.desc&limit=50',
    { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' } }
  );
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadLb() {
  try {
    const data = await fetchScores();

    document.getElementById('lastUpdate').textContent =
      'Dernière mise à jour : ' + new Date().toLocaleTimeString('fr-FR');

    if (!data || !data.length) {
      document.getElementById('podium').innerHTML = '';
      document.getElementById('lbList').innerHTML =
        '<div class="empty">Aucun résultat pour le moment.<br>L\'épreuve n\'a pas encore commencé. 🚌</div>';
      return;
    }

    // PODIUM
    const medals = ['🥇', '🥈', '🥉'];
    const top3   = data.slice(0, 3);
    const order  = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3.length === 2 ? [top3[1], top3[0]] : top3;
    const ranks  = top3.length >= 3 ? [2, 1, 3] : top3.length === 2 ? [2, 1] : [1];

    const pod = document.getElementById('podium');
    pod.innerHTML = '';
    order.forEach((e, i) => {
      const r = ranks[i];
      const d = document.createElement('div');
      d.className = 'pod p' + r;
      d.innerHTML =
        '<div class="pod-medal">' + medals[r-1] + '</div>' +
        '<div class="pod-av">' + e.prenom[0].toUpperCase() + '</div>' +
        '<div class="pod-name">' + e.prenom + '<br>' + e.nom.toUpperCase() + '</div>' +
        '<div class="pod-pts">' + e.score_final + ' pts</div>';
      pod.appendChild(d);
    });

    // LISTE
    const list = document.getElementById('lbList');
    list.innerHTML = '';
    data.forEach((e, i) => {
      const row = document.createElement('div');
      row.className = 'lb-row';
      row.innerHTML =
        '<div class="lb-rank">' + (i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1) + '</div>' +
        '<div class="lb-av">' + e.prenom[0].toUpperCase() + '</div>' +
        '<div class="lb-info">' +
          '<div class="lb-name">' + e.prenom + ' ' + e.nom.toUpperCase() + '</div>' +
          '<div class="lb-sub">' +
            'Écrit : ' + (e.score_ecrit ?? '—') + ' pts &nbsp;·&nbsp; ' +
            'Pénalités : ' + (e.penalite ?? 0) + ' pts &nbsp;·&nbsp; ' +
            'Arrêt : +' + (e.zone_pts ?? 0) + ' pts &nbsp;·&nbsp; ' +
            'Temps : +' + (e.temps_pts ?? 0) + ' pts' +
          '</div>' +
        '</div>' +
        '<div class="lb-pts">' + e.score_final + ' pts</div>';
      list.appendChild(row);
    });

  } catch(e) {
    document.getElementById('lbList').innerHTML =
      '<div class="empty">❌ Erreur de chargement<br><small>' + e.message + '</small></div>';
  }
}

document.getElementById('btnRefresh').addEventListener('click', loadLb);

// Chargement initial
loadLb();

// Rafraîchissement automatique toutes les 30 secondes
setInterval(loadLb, 30000);
</script>
</body>
</html>
